parameters:
- name: service_connection
  type: string
- name: terraform_work_directory
  type: string

steps:
- task: AzureKeyVault@2
  displayName: Get Terraform Secret
  inputs:
    azureSubscription: ${{parameters.service_connection}}
    KeyVaultName: 'cbd-enterprise-kv'
    SecretsFilter: 'cbd-global-terraform-user-client-certificate'
    RunAsPreJob: false

- powershell: |
    $dir = "${{parameters.terraform_work_directory}}"
    if (!(Test-Path $dir)) { New-Item -ItemType Directory -Path $dir -Force }
    
    $base64Cert = "$(cbd-global-terraform-user-client-certificate)"
    $certBytes = [System.Convert]::FromBase64String($base64Cert)
    
    $filePath = Join-Path $dir "terraform-cert.pem"
    [System.IO.File]::WriteAllBytes($filePath, $certBytes)
    
    Write-Host "Cert successfully written to: $filePath"
    ls $filePath # Verify it exists immediately
  displayName: 'Install Certificate'

- task: KubeloginInstaller@0
  displayName: Install Kubelogin
  inputs:
    kubeloginVersion: '0.2.17'